<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>CogniRunner Admin</title><style>/* LeanZero Design System - Pre-JS rendering styles */
            :root {
                --bg-color: transparent;
                --text-color: #0f172a;
                --text-secondary: #64748b;
                --text-muted: #94a3b8;
                --primary-color: #2563eb;
                --error-color: #dc2626;
                --success-color: #16a34a;
                --warning-color: #d97706;
                --border-color: #cbd5e1;
                --card-bg: #ffffff;
                --code-bg: #f1f5f9;
                --hover-bg: #f1f5f9;
                --border-radius-sm: 0.5rem;
            }

            html[data-color-mode="dark"] {
                --bg-color: transparent;
                --text-color: #F5F5F7;
                --text-secondary: #A0A0B0;
                --text-muted: #6b7280;
                --primary-color: #3b82f6;
                --error-color: #ef4444;
                --success-color: #22c55e;
                --warning-color: #f59e0b;
                --border-color: #374151;
                --card-bg: #13131A;
                --code-bg: #1e293b;
                --hover-bg: #1e1e24;
            }

            *, *::before, *::after { box-sizing: border-box; }

            html, body {
                margin: 0;
                padding: 0;
                font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                background: var(--bg-color);
                color: var(--text-color);
                font-size: 14px;
                line-height: 1.5;
            }

            #root { min-height: 100%; }

            .loading-spinner {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px;
            }

            .spinner {
                width: 32px;
                height: 32px;
                border: 3px solid var(--border-color);
                border-top-color: var(--primary-color);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }

            .loading-text {
                margin-top: 12px;
                font-size: 13px;
                color: var(--text-secondary);
            }

            @keyframes spin { to { transform: rotate(360deg); } }

                display: flex;
                align-items: center;
                gap: 6px;
                padding: 10px 14px;
                border-radius: var(--border-radius-sm);
                font-size: 13px;
                margin-bottom: 20px;
                border: 1px solid;
            }

            .license-active {
                background: rgba(22, 163, 74, 0.1);
                border-color: var(--success-color);
                color: var(--success-color);
            }
