<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>CogniRunner Admin</title><style>:root {
                --bg-color: transparent;
                --text-color: #0f172a;
                --text-secondary: #64748b;
                --text-muted: #94a3b8;
                --primary-color: #2563eb;
                --error-color: #dc2626;
                --success-color: #16a34a;
                --border-color: #cbd5e1;
                --card-bg: #ffffff;
                --input-bg: #f8fafc;
                --code-bg: #f1f5f9;
                --icon-bg: #dbeafe;
                --hover-bg: #f1f5f9;
            }
            html[data-color-mode="dark"] {
                --bg-color: transparent;
                --text-color: #F5F5F7;
                --text-secondary: #A0A0B0;
                --text-muted: #71717a;
                --primary-color: #3b82f6;
                --error-color: #ef4444;
                --success-color: #22c55e;
                --border-color: #374151;
                --card-bg: #13131A;
                --input-bg: #0A0A0F;
                --code-bg: #0A0A0F;
                --icon-bg: #1e3a5f;
                --hover-bg: #1f1f2e;
            }
            *, *::before, *::after { box-sizing: border-box; }
            html, body {
                margin: 0; padding: 0;
                font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                background: var(--bg-color);
                color: var(--text-color);
                font-size: 14px; line-height: 1.5;
            }
            #root { min-height: 100%; }
            .loading-spinner {
                display: flex; flex-direction: column;
                align-items: center; justify-content: center;
                padding: 40px;
            }
            .spinner {
                width: 32px; height: 32px;
                border: 3px solid var(--border-color);
                border-top-color: var(--primary-color);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            .loading-text { margin-top: 12px; font-size: 13px; color: var(--text-secondary); }
            @keyframes spin { to { transform: rotate(360deg); } }

            .sk {
                background: linear-gradient(90deg, #cbd5e1 25%, #f1f5f9 50%, #cbd5e1 75%);
                background-size: 200% 100%;
                animation: skShimmer 1.5s ease-in-out infinite;
                border-radius: 4px;
            }
            html[data-color-mode="dark"] .sk {
                background: linear-gradient(90deg, #1e1e2e 25%, #2a2a3a 50%, #1e1e2e 75%);
                background-size: 200% 100%;
            }
            @media (prefers-color-scheme: dark) {
                .sk { background: linear-gradient(90deg, #1e1e2e 25%, #2a2a3a 50%, #1e1e2e 75%); background-size: 200% 100%; }
            }
            @keyframes skShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
            .sk-text { border-radius: 6px; }
            .sk-block { border-radius: 8px; }</style><script defer="defer" src="./bundle.e222266c.js"></script></head><body><div id="root"></div></body></html>
