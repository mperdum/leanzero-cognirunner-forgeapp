<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>AI Validator Configuration View</title>
        <style>
            /* LeanZero Design System - CSS Custom Properties */
            :root {
                --bg-color: transparent;
                --text-color: #0f172a;
                --text-secondary: #64748b;
                --text-muted: #94a3b8;
                --primary-color: #2563eb;
                --code-bg: #f1f5f9;
                --success-color: #16a34a;
                --error-color: #dc2626;
                --warning-color: #d97706;
                --border-color: #cbd5e1;
                --card-bg: #ffffff;
            }

            /* Dark theme */
            html[data-color-mode="dark"] {
                --bg-color: transparent;
                --text-color: #F5F5F7;
                --text-secondary: #A0A0B0;
                --text-muted: #6b7280;
                --primary-color: #3b82f6;
                --code-bg: #1e293b;
                --success-color: #22c55e;
                --error-color: #ef4444;
                --warning-color: #f59e0b;
                --border-color: #374151;
                --card-bg: #13131A;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                padding: 0;
                font-family:
                    "Inter", system-ui, -apple-system, BlinkMacSystemFont,
                    "Segoe UI", Roboto, sans-serif;
                background: var(--bg-color);
                color: var(--text-color);
                font-size: 13px;
                line-height: 1.4;
            }

            #root {
                min-height: 100%;
            }

            .container {
                padding: 8px 12px;
            }

            .empty {
                display: flex;
                align-items: center;
                gap: 8px;
                color: var(--text-muted);
            }

            .config-item {
                display: flex;
                align-items: flex-start;
                gap: 8px;
                margin-bottom: 6px;
            }

            .config-item:last-child {
                margin-bottom: 0;
            }

            .label {
                font-weight: 600;
                font-size: 12px;
                flex-shrink: 0;
                min-width: 50px;
                color: var(--text-secondary);
            }

            .value {
                padding: 2px 8px;
                border-radius: 3px;
                font-size: 12px;
                font-family:
                    SFMono-Regular, Consolas, "Liberation Mono", Menlo,
                    monospace;
                background-color: var(--code-bg);
                color: var(--primary-color);
            }

            .prompt-value {
                font-size: 12px;
                word-break: break-word;
                color: var(--text-color);
            }

            .loading-text {
                font-size: 12px;
                color: var(--text-muted);
            }

            .license-banner {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 8px 10px;
                border-radius: 4px;
                font-size: 11px;
                margin-bottom: 10px;
                border: 1px solid;
            }

            .license-active {
                background: rgba(22, 163, 74, 0.1);
                border-color: var(--success-color);
                color: var(--success-color);
            }

            .license-inactive {
                background: rgba(220, 38, 38, 0.1);
                border-color: var(--error-color);
                color: var(--error-color);
            }

            .rule-status-banner {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                padding: 8px 10px;
                border-radius: 4px;
                font-size: 11px;
                margin-bottom: 10px;
                border: 1px solid;
            }

            .status-disabled-banner {
                border-color: var(--error-color);
                background: rgba(220, 38, 38, 0.08);
                color: var(--error-color);
            }

            .status-active-banner {
                border-color: var(--success-color);
                background: rgba(22, 163, 74, 0.08);
                color: var(--success-color);
            }

            .rule-status-content {
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .btn-enable {
                color: var(--success-color);
                border-color: var(--success-color);
                flex-shrink: 0;
            }

            .btn-enable:hover {
                background: rgba(22, 163, 74, 0.1);
            }

            .btn-danger {
                color: var(--error-color);
                border-color: var(--error-color);
                flex-shrink: 0;
            }

            .btn-danger:hover {
                background: rgba(220, 38, 38, 0.1);
            }

            .alert {
                display: flex;
                align-items: flex-start;
                gap: 6px;
                padding: 8px 10px;
                border-radius: 4px;
                font-size: 11px;
                margin-bottom: 10px;
                border: 1px solid;
            }

            .alert-error {
                background: rgba(220, 38, 38, 0.08);
                border-color: var(--error-color);
                color: var(--error-color);
            }

            .alert-warning {
                background: rgba(217, 119, 6, 0.08);
                border-color: var(--warning-color);
                color: var(--warning-color);
            }

            .alert-dismiss {
                margin-left: auto;
                background: none;
                border: none;
                color: inherit;
                cursor: pointer;
                font-size: 14px;
                line-height: 1;
                padding: 0 2px;
                opacity: 0.7;
            }

            .alert-dismiss:hover {
                opacity: 1;
            }

            .log-tools {
                margin-top: 4px;
                font-size: 10px;
                color: var(--text-muted);
            }

            .log-tools-badge {
                display: inline-block;
                padding: 1px 5px;
                border-radius: 3px;
                font-size: 10px;
                font-weight: 600;
                background: rgba(37, 99, 235, 0.1);
                color: var(--primary-color);
                margin-right: 6px;
            }

            html[data-color-mode="dark"] .log-tools-badge {
                background: rgba(59, 130, 246, 0.15);
            }

            .log-queries {
                margin-top: 3px;
                padding: 3px 6px;
                background: var(--code-bg);
                border-radius: 3px;
                font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
                font-size: 10px;
                word-break: break-all;
                color: var(--text-secondary);
            }
        </style>
    </head>
    <body>
        <div id="root"></div>
    </body>
</html>
