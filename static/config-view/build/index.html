<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>AI Validator Configuration View</title><style>/* CSS Custom Properties - Light theme (default) */
            :root {
                --bg-color: transparent;
                --text-color: #172b4d;
                --text-secondary: #5e6c84;
                --text-muted: #7a869a;
                --primary-color: #0052cc;
                --code-bg: #f4f5f7;
            }

            /* Dark theme */
            html[data-color-mode="dark"] {
                --bg-color: transparent;
                --text-color: #b6c2cf;
                --text-secondary: #9fadbc;
                --text-muted: #8c9bab;
                --primary-color: #579dff;
                --code-bg: #1d2125;
            }

            *,
            *::before,
            *::after {
                box-sizing: border-box;
            }

            html,
            body {
                margin: 0;
                padding: 0;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Oxygen, Ubuntu, sans-serif;
                background: var(--bg-color);
                color: var(--text-color);
                font-size: 13px;
                line-height: 1.4;
            }

            #root {
                min-height: 100%;
            }

            .container {
                padding: 8px 12px;
            }

            .empty {
                display: flex;
                align-items: center;
                gap: 8px;
                color: var(--text-muted);
            }

            .config-item {
                display: flex;
                align-items: flex-start;
                gap: 8px;
                margin-bottom: 6px;
            }

            .config-item:last-child {
                margin-bottom: 0;
            }

            .label {
                font-weight: 600;
                font-size: 12px;
                flex-shrink: 0;
                min-width: 50px;
                color: var(--text-secondary);
            }

            .value {
                padding: 2px 8px;
                border-radius: 3px;
                font-size: 12px;
                font-family:
                    SFMono-Regular, Consolas, "Liberation Mono", Menlo,
                    monospace;
                background-color: var(--code-bg);
                color: var(--primary-color);
            }

            .prompt-value {
                font-size: 12px;
                word-break: break-word;
                color: var(--text-color);
            }

            .loading-text {
                font-size: 12px;
                color: var(--text-muted);
            }

            .license-banner {
                display: flex;
                align-items: center;
                gap: 6px;
                padding: 8px 10px;
                border-radius: 4px;
                font-size: 11px;
                margin-bottom: 10px;
                border: 1px solid;
            }

            .license-active {
                background: rgba(0, 102, 68, 0.1);
                border-color: #006644;
                color: #006644;
            }

            html[data-color-mode="dark"] .license-active {
                border-color: #4bce97;
                color: #4bce97;
            }

            .license-inactive {
                background: rgba(222, 53, 11, 0.1);
                border-color: #de350b;
                color: #de350b;
            }

            html[data-color-mode="dark"] .license-inactive {
                border-color: #f87168;
                color: #f87168;
            }

            .rule-status-banner {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 8px;
                padding: 8px 10px;
                border-radius: 4px;
                font-size: 11px;
                margin-bottom: 10px;
                border: 1px solid;
            }

            .status-disabled-banner {
                border-color: #de350b;
                background: rgba(222, 53, 11, 0.08);
                color: #de350b;
            }

            html[data-color-mode="dark"] .status-disabled-banner {
                border-color: #f87168;
                color: #f87168;
            }

            .status-active-banner {
                border-color: #006644;
                background: rgba(0, 102, 68, 0.08);
                color: #006644;
            }

            html[data-color-mode="dark"] .status-active-banner {
                border-color: #4bce97;
                color: #4bce97;
            }

            .rule-status-content {
                display: flex;
                align-items: center;
                gap: 6px;
            }

            .btn-enable {
                color: #006644;
                border-color: #006644;
                flex-shrink: 0;
            }

            html[data-color-mode="dark"] .btn-enable {
                color: #4bce97;
                border-color: #4bce97;
            }

            .btn-enable:hover {
                background: rgba(0, 102, 68, 0.1);
            }

            .btn-danger {
                color: #de350b;
                border-color: #de350b;
                flex-shrink: 0;
            }

            html[data-color-mode="dark"] .btn-danger {
                color: #f87168;
                border-color: #f87168;
            }

            .btn-danger:hover {
                background: rgba(222, 53, 11, 0.1);
            }

            .alert {
                display: flex;
                align-items: flex-start;
                gap: 6px;
                padding: 8px 10px;
                border-radius: 4px;
                font-size: 11px;
                margin-bottom: 10px;
                border: 1px solid;
            }

            .alert-error {
                background: rgba(222, 53, 11, 0.08);
                border-color: #de350b;
                color: #de350b;
            }

            html[data-color-mode="dark"] .alert-error {
                border-color: #f87168;
                color: #f87168;
            }

            .alert-warning {
                background: rgba(255, 153, 31, 0.08);
                border-color: #ff991f;
                color: #ff991f;
            }

            html[data-color-mode="dark"] .alert-warning {
                color: #f5cd47;
                border-color: #f5cd47;
            }

            .alert-dismiss {
                margin-left: auto;
                background: none;
                border: none;
                color: inherit;
                cursor: pointer;
                font-size: 14px;
                line-height: 1;
                padding: 0 2px;
                opacity: 0.7;
            }

            .alert-dismiss:hover {
                opacity: 1;
            }

            .log-tools {
                margin-top: 4px;
                font-size: 10px;
                color: var(--text-muted);
            }

            .log-tools-badge {
                display: inline-block;
                padding: 1px 5px;
                border-radius: 3px;
                font-size: 10px;
                font-weight: 600;
                background: rgba(0, 82, 204, 0.1);
                color: #0052cc;
                margin-right: 6px;
            }

            html[data-color-mode="dark"] .log-tools-badge {
                background: rgba(87, 157, 255, 0.15);
                color: #579dff;
            }

            .log-queries {
                margin-top: 3px;
                padding: 3px 6px;
                background: var(--code-bg);
                border-radius: 3px;
                font-family: SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
                font-size: 10px;
                word-break: break-all;
                color: var(--text-secondary);
            }</style><script defer="defer" src="./bundle.f8ada044.js"></script></head><body><div id="root"></div></body></html>
