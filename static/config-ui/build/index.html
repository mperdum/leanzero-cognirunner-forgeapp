<!doctype html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>CogniRunner Configuration</title><style>/* LeanZero Design System — Light theme */
            :root {
                --bg-color: transparent;
                --text-color: #0f172a;
                --text-secondary: #64748b;
                --text-muted: #94a3b8;
                --primary-color: #2563eb;
                --error-color: #dc2626;
                --success-color: #16a34a;
                --border-color: #cbd5e1;
                --card-bg: #ffffff;
                --input-bg: #f8fafc;
                --code-bg: #f1f5f9;
                --icon-bg: #dbeafe;
            }

            /* LeanZero Design System — Dark theme */
            html[data-color-mode="dark"] {
                --bg-color: transparent;
                --text-color: #F5F5F7;
                --text-secondary: #A0A0B0;
                --text-muted: #71717a;
                --primary-color: #3b82f6;
                --error-color: #ef4444;
                --success-color: #22c55e;
                --border-color: #374151;
                --card-bg: #13131A;
                --input-bg: #0A0A0F;
                --code-bg: #0A0A0F;
                --icon-bg: #1e3a5f;
            }

            *, *::before, *::after { box-sizing: border-box; }

            html, body {
                margin: 0;
                padding: 0;
                font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
                background: var(--bg-color);
                color: var(--text-color);
                font-size: 14px;
                line-height: 1.5;
            }

            #root { min-height: 100%; }

            .loading-spinner {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px;
            }

            .spinner {
                width: 32px;
                height: 32px;
                border: 3px solid var(--border-color);
                border-top-color: var(--primary-color);
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
                box-shadow: 0 0 12px rgba(37, 99, 235, 0.2);
            }

            .loading-text {
                margin-top: 12px;
                font-size: 13px;
                color: var(--text-secondary);
            }

            @keyframes spin { to { transform: rotate(360deg); } }</style><script defer="defer" src="./bundle.6fb35888.js"></script></head><body><div id="root"></div></body></html>
