modules:
  # Workflow Validator - validates on transition using AI
  jira:workflowValidator:
    - key: ai-text-field-validator
      name: CogniRunner Field Validator
      description: Validates a text field value against a custom AI prompt on workflow
        transition.
      function: validate
      resolver:
        function: resolver
      create:
        resource: config-ui-resource
      edit:
        resource: config-ui-resource
      view:
        resource: config-view-resource
      projectTypes:
        - company-managed
        - team-managed

  # Workflow Condition - controls visibility of transition based on AI
  jira:workflowCondition:
    - key: ai-text-field-condition
      name: CogniRunner Field Condition
      description: Shows transition only if a text field value passes AI validation.
      function: validate
      resolver:
        function: resolver
      expression: "true"
      create:
        resource: config-ui-resource
      edit:
        resource: config-ui-resource
      view:
        resource: config-view-resource
      projectTypes:
        - company-managed
        - team-managed

  # Workflow Post Functions - execute after transition
  jira:workflowPostFunction:
    - key: ai-semantic-post-function
      name: CogniRunner Semantic Post Function
      description: AI evaluates a condition and modifies a target field after workflow
        transition.
      function: executePostFunction
      resolver:
        function: resolver
      create:
        resource: config-ui-resource
      edit:
        resource: config-ui-resource
      view:
        resource: config-view-resource
      projectTypes:
        - company-managed
        - team-managed

    - key: ai-static-post-function
      name: CogniRunner Static Post Function
      description: Chains multiple operations with AI-generated code after workflow
        transition.
      function: executePostFunction
      resolver:
        function: resolver
      create:
        resource: config-ui-resource
      edit:
        resource: config-ui-resource
      view:
        resource: config-view-resource
      projectTypes:
        - company-managed
        - team-managed

  # Global page - shows under Apps in Jira sidebar navigation
  jira:globalPage:
    - key: cognirunner-global-page
      resource: admin-panel-resource
      title: CogniRunner
      icon: resource:icon-resource;icon.svg
      resolver:
        function: resolver

  # Admin page - Jira admin settings (guaranteed access for site admins)
  jira:adminPage:
    - key: cognirunner-admin-settings
      resource: admin-panel-resource
      title: CogniRunner Settings
      icon: resource:icon-resource;icon.svg
      resolver:
        function: resolver

  # Async event consumer for long-running AI tasks
  consumer:
    - key: async-ai-consumer
      queue: async-ai-queue
      function: async-ai-handler

  # Lambda function for validation logic
  function:
    - key: validate
      handler: index.validate
    - key: executePostFunction
      handler: index.executePostFunction
    - key: async-ai-handler
      handler: async-handler.handler
      timeoutSeconds: 120
    - key: resolver
      handler: index.handler

resources:
  - key: config-ui-resource
    path: static/config-ui/build

  - key: config-view-resource
    path: static/config-view/build

  - key: admin-panel-resource
    path: static/admin-panel/build

  - key: icon-resource
    path: static/icons

permissions:
  content:
    styles:
      - unsafe-inline
  scopes:
    - read:jira-work
    - write:jira-work
    - read:jira-user
    - read:workflow:jira
    - write:workflow:jira
    - read:project:jira
    - storage:app
    - read:issue-type-screen-scheme:jira
    - read:screen-scheme:jira
    - read:screen-tab:jira
    - manage:jira-configuration
    - read:screenable-field:jira
  external:
    images:
      - address: "*.atlassian.net"
    fetch:
      client:
        - address: https://api.openai.com
        - address: "*.openai.azure.com"
        - address: https://openrouter.ai
        - address: https://api.anthropic.com
        # LM Studio: user-hosted servers exposed via Tailscale Funnel
        - address: "*.ts.net"
      backend:
        - address: https://api.openai.com
        - address: "*.openai.azure.com"
        - address: https://openrouter.ai
        - address: https://api.anthropic.com
        # LM Studio: user-hosted servers exposed via Tailscale Funnel
        - address: "*.ts.net"

app:
  runtime:
    name: nodejs22.x
  id: ari:cloud:ecosystem::app/36415848-6868-4697-9554-3c3ad87b8da9
  licensing:
    enabled: true
